{% extends 'starter-page.html' %}
{% block body %}
 <h1 class="text-center p-3">We're glad for your response!</h1>
    <p class="text-center p-2">We'll reach  out to you shortly</p>n
    <table class="table table-bordered table-secondary border-black container">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Subject</th>
        <th>Message</th>
        <th>Action</th>
    </tr>



    {% for x in contact %}
        <tr>
            <td>{{ x.name }}</td>
            <td>{{ x.email }}</td>
            <td>{{ x.subject }}</td>
            <td>{{ x.message }}</td>
            <td>
                <a href="{% url 'editcontact' x.id %}" class="btn btn-success">EDIT</a>
                <a href="{% url 'delete_contact' x.id %}`" class="btn btn-success">DELETE</a>
                <a href="" class="btn btn-danger">PAY</a>
            </td>
        </tr>

    {% endfor %}



    </table>





{% endblock %}
